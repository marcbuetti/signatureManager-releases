name: Release Sync Pipeline

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ========================
  # 1. FETCH RELEASE DATA
  # ========================
  fetch:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.data.outputs.version }}
      name: ${{ steps.data.outputs.name }}
      body: ${{ steps.data.outputs.body }}
      dmg_url: ${{ steps.data.outputs.dmg_url }}
      dmg_name: ${{ steps.data.outputs.dmg_name }}

    steps:
      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Fetch latest release
        id: data
        run: |
          DATA=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/marcbuetti/macOS-SignatureManager/releases/latest)
      
          echo "$DATA"
      
          VERSION=$(echo "$DATA" | jq -r '.tag_name')
          NAME=$(echo "$DATA" | jq -r '.name')
          BODY=$(echo "$DATA" | jq -r '.body')
      
          DMG_URL=$(echo "$DATA" | jq -r '.assets[]? | select(.name | test("\\.dmg$"; "i")) | .browser_download_url' | head -n1)
          DMG_NAME=$(echo "$DATA" | jq -r '.assets[]? | select(.name | test("\\.dmg$"; "i")) | .name' | head -n1)
      
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT
      
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
          echo "dmg_url=$DMG_URL" >> $GITHUB_OUTPUT
          echo "dmg_name=$DMG_NAME" >> $GITHUB_OUTPUT


  # ========================
  # 2. UPDATE HTML
  # ========================
  update_html:
    runs-on: ubuntu-latest
    needs: fetch

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Sync repo
        run: |
          git fetch origin
          git reset --hard origin/main

      - name: Check duplicate
        id: check
        run: |
          if grep -q "Version ${{ needs.fetch.outputs.version }}" releaseNotes.html; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Update HTML
        if: steps.check.outputs.exists == 'false'
        run: |
          FILE="releaseNotes.html"
      
          VERSION="${{ needs.fetch.outputs.version }}"
          BODY="${{ needs.fetch.outputs.body }}"
      
          # 👉 BODY in einzelne <li> umwandeln
          ITEMS=$(echo "$BODY" | sed 's/^- //g' | sed '/^$/d' | sed 's/^/<li>/' | sed 's/$/<\/li>/')
      
          NEW_BLOCK=$(cat <<EOF
          <div class="card">
              <div class="version">Version ${VERSION}</div>
              <ul class="changes">
                  ${ITEMS}
              </ul>
          </div>
          EOF
          )
      
          # 👉 Einfügen direkt nach der warning box
          awk -v block="$NEW_BLOCK" '
            /<\/div>[[:space:]]*$/ && inserted == 0 {
              print
              print block
              inserted=1
              next
            }
            { print }
          ' "$FILE" > temp.html
      
          mv temp.html "$FILE"

      - name: Commit & Push
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add releaseNotes.html
          git commit -m "Update release notes ${{ needs.fetch.outputs.version }}"
          git push origin main


  # ========================
  # 3. MIRROR RELEASE
  # ========================
  mirror_release:
    runs-on: ubuntu-latest
    needs: fetch

    steps:
      - uses: actions/checkout@v5

      - name: Check if release exists
        id: check
        run: |
          if curl -s \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ needs.fetch.outputs.version }} \
            | grep -q '"tag_name"'; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Download DMG
        if: steps.check.outputs.exists == 'false' && needs.fetch.outputs.dmg_url != ''
        run: |
          curl -L "${{ needs.fetch.outputs.dmg_url }}" -o "${{ needs.fetch.outputs.dmg_name }}"

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false' && needs.fetch.outputs.dmg_name != ''
        run: |
          gh release create "${{ needs.fetch.outputs.version }}" \
            "${{ needs.fetch.outputs.dmg_name }}" \
            --title "${{ needs.fetch.outputs.name }}" \
            --notes "${{ needs.fetch.outputs.body }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}


  # ========================
  # 4. GENERATE APPCAST
  # ========================
  generate_appcast:
    runs-on: macos-latest
    needs: [fetch, mirror_release]
    if: needs.fetch.outputs.dmg_name != ''

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Sync repo
        run: |
          git fetch origin
          git reset --hard origin/main

      - name: Download DMG (from own repo)
        if: needs.fetch.outputs.dmg_name != ''
        run: |
          curl -L \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            "https://github.com/${{ github.repository }}/releases/download/${{ needs.fetch.outputs.version }}/${{ needs.fetch.outputs.dmg_name }}" \
            -o "${{ needs.fetch.outputs.dmg_name }}"
      
      - name: Extract build version from DMG
        id: build
        run: |
          mkdir mount
          hdiutil attach "${{ needs.fetch.outputs.dmg_name }}" -mountpoint mount
          APP_PATH=$(find mount -name "*.app" | head -n1)
          BUILD=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$APP_PATH/Contents/Info.plist")
          hdiutil detach mount
          echo "build=$BUILD" >> $GITHUB_OUTPUT

      - name: Install Sparkle sign tool
        run: |
          echo "Fetching Sparkle release..."
      
          API=$(curl -s https://api.github.com/repos/sparkle-project/Sparkle/releases/latest)
      
          URL=$(echo "$API" | jq -r '.assets[] | select(.name | test(".*\\.tar\\.xz$")) | .browser_download_url' | head -n1)
      
          echo "Download URL: $URL"
      
          curl -L "$URL" -o sparkle.tar.xz
      
          tar -xf sparkle.tar.xz
      
          SIGN_TOOL=$(find . -name sign_update | head -n1)
      
          if [ -z "$SIGN_TOOL" ]; then
            echo "sign_update not found!"
            exit 1
          fi
      
          mv "$SIGN_TOOL" ./sign_update
          chmod +x sign_update
      
          ./sign_update || true

      - name: Sign DMG
        id: sign
        run: |
          xcrun --find sign_update
      
          SIGNATURE=$(xcrun sign_update \
            "${{ needs.fetch.outputs.dmg_name }}" \
            "${{ secrets.SPARKLE_PRIVATE_KEY }}" \
            | grep sparkle:edSignature \
            | sed 's/.*"\(.*\)".*/\1/')
      
          echo "signature=$SIGNATURE" >> $GITHUB_OUTPUT
      
      - name: Get DMG size
        id: dmg
        run: |
          SIZE=$(stat -f%z "${{ needs.fetch.outputs.dmg_name }}")
          echo "size=$SIZE" >> $GITHUB_OUTPUT

      - name: Generate Appcast XML
        run: |
          DATE=$(date -R)

          cat > appcast.xml <<EOF
          <?xml version="1.0" standalone="yes"?>
          <rss xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" version="2.0">
            <channel>
              <title>Signature Manager</title>
          
              <item>
                <title>${{ needs.fetch.outputs.version }}</title>
                <pubDate>${DATE}</pubDate>
                <sparkle:version>${{ steps.build.outputs.build }}</sparkle:version>
                <sparkle:shortVersionString>${{ needs.fetch.outputs.version }}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
                <sparkle:releaseNotesLink>https://marcbuetti.github.io/signatureManager-releases/releaseNotes.html</sparkle:releaseNotesLink>
          
                <enclosure 
                  url="https://github.com/${{ github.repository }}/releases/download/${{ needs.fetch.outputs.version }}/${{ needs.fetch.outputs.dmg_name }}"
                  length="${{ steps.dmg.outputs.size }}"
                  type="application/octet-stream"
                  sparkle:edSignature="${{ steps.sign.outputs.signature }}"
                />
              </item>
          
            </channel>
          </rss>
          EOF

      - name: Commit & Push Appcast
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add appcast.xml
          git diff --cached --quiet || git commit -m "Update appcast ${{ needs.fetch.outputs.version }}"
          git push origin main
