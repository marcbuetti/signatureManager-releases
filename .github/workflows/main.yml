name: Update Release Notes

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Fetch latest release
        run: |
          DATA=$(curl -s https://api.github.com/repos/marcbuetti/macOS-SignatureManager/releases/latest)

          VERSION=$(echo $DATA | jq -r '.tag_name')
          BODY=$(echo $DATA | jq -r '.body')

          echo "VERSION=$VERSION" >> $GITHUB_ENV

          echo "BODY<<EOF" >> $GITHUB_ENV
          echo "$BODY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Update HTML file
        run: |
          FILE="releaseNotes.html"

          NEW_ENTRY="<h1>Version ${VERSION}</h1>\n<p>${BODY}</p>\n"

          echo -e "$NEW_ENTRY$(cat $FILE)" > $FILE

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
      
          # IMMER zuerst neuesten Stand holen
          git fetch origin
          git reset --hard origin/main
      
          # Jetzt Änderungen einfügen
          git add releaseNotes.html
      
          # Nur committen wenn nötig
          git diff --cached --quiet || git commit -m "Update release notes ${VERSION}"
      
          # Push (jetzt ohne Konflikt)
          git push origin main
