name: Release Sync Pipeline

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ========================
  # 1. FETCH RELEASE DATA
  # ========================
  fetch:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.data.outputs.version }}
      name: ${{ steps.data.outputs.name }}
      body: ${{ steps.data.outputs.body }}
      dmg_url: ${{ steps.data.outputs.dmg_url }}
      dmg_name: ${{ steps.data.outputs.dmg_name }}

    steps:
      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Fetch latest release
        id: data
        run: |
          DATA=$(curl -s https://api.github.com/repos/marcbuetti/macOS-SignatureManager/releases/latest)

          VERSION=$(echo $DATA | jq -r '.tag_name')
          NAME=$(echo $DATA | jq -r '.name')
          BODY=$(echo $DATA | jq -r '.body')
          DMG_URL=$(echo $DATA | jq -r '.assets[] | select(.name | endswith(".dmg")) | .browser_download_url')
          DMG_NAME=$(echo $DATA | jq -r '.assets[] | select(.name | endswith(".dmg")) | .name')

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT

          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "dmg_url=$DMG_URL" >> $GITHUB_OUTPUT
          echo "dmg_name=$DMG_NAME" >> $GITHUB_OUTPUT


  # ========================
  # 2. UPDATE HTML
  # ========================
  update_html:
    runs-on: ubuntu-latest
    needs: fetch

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Sync repo
        run: |
          git fetch origin
          git reset --hard origin/main

      - name: Check duplicate
        id: check
        run: |
          if grep -q "Version ${{ needs.fetch.outputs.version }}" releaseNotes.html; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Update HTML
        if: steps.check.outputs.exists == 'false'
        run: |
          FILE="releaseNotes.html"
          NEW_ENTRY="<h1>Version ${{ needs.fetch.outputs.version }}</h1>\n<p>${{ needs.fetch.outputs.body }}</p>\n"
          echo -e "$NEW_ENTRY$(cat $FILE)" > $FILE

      - name: Commit & Push
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add releaseNotes.html
          git commit -m "Update release notes ${{ needs.fetch.outputs.version }}"
          git push origin main


  # ========================
  # 3. MIRROR RELEASE
  # ========================
  mirror_release:
    runs-on: ubuntu-latest
    needs: fetch

    steps:
      - uses: actions/checkout@v5

      - name: Check if release exists
        id: check
        run: |
          if curl -s https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ needs.fetch.outputs.version }} | grep -q '"tag_name"'; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Download DMG
        if: steps.check.outputs.exists == 'false'
        run: |
          curl -L "${{ needs.fetch.outputs.dmg_url }}" -o "${{ needs.fetch.outputs.dmg_name }}"

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        run: |
          gh release create "${{ needs.fetch.outputs.version }}" "${{ needs.fetch.outputs.dmg_name }}" --title "${{ needs.fetch.outputs.name }}" --notes "${{ needs.fetch.outputs.body }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  # ========================
  # 4. GENERATE APPCAST
  # ========================
  generate_appcast:
    runs-on: ubuntu-latest
    needs: [fetch, mirror_release]

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Sync repo
        run: |
          git fetch origin
          git reset --hard origin/main

      - name: Download DMG (from own repo)
        run: |
          curl -L "https://github.com/${{ github.repository }}/releases/download/${{ needs.fetch.outputs.version }}/${{ needs.fetch.outputs.dmg_name }}" 
          -o "${{ needs.fetch.outputs.dmg_name }}"

      - name: Install Sparkle tools
        run: |
          git clone https://github.com/sparkle-project/Sparkle.git
          cd Sparkle
          make

      - name: Sign DMG
        id: sign
        run: |
          chmod +x Sparkle/bin/sign_update

          SIGNATURE=$(Sparkle/bin/sign_update 
            "${{ needs.fetch.outputs.dmg_name }}" 
            "$(printf '%s' "${{ secrets.SPARKLE_PRIVATE_KEY }}")" 
            | grep sparkle:edSignature 
            | sed 's/."(.)".*/\1/')

          echo "signature=$SIGNATURE" >> $GITHUB_OUTPUT

      - name: Get DMG size
        id: dmg
        run: |
          SIZE=$(stat -c%s "${{ needs.fetch.outputs.dmg_name }}")
          echo "size=$SIZE" >> $GITHUB_OUTPUT

      - name: Generate Appcast XML
        run: |
          DATE=$(date -R)

          cat > appcast.xml <<EOF
          <?xml version="1.0" standalone="yes"?>
          <rss xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" version="2.0">
            <channel>
              <title>Signature Manager</title>
          
              <item>
                <title>${{ needs.fetch.outputs.version }}</title>
                <pubDate>${DATE}</pubDate>
                sparkle:version${{ needs.fetch.outputs.version }}</sparkle:version>
                sparkle:shortVersionString${{ needs.fetch.outputs.version }}</sparkle:shortVersionString>
                sparkle:minimumSystemVersion14.0</sparkle:minimumSystemVersion>
                sparkle:releaseNotesLinkhttps://marcbuetti.github.io/signatureManager-releases/releaseNotes.html</sparkle:releaseNotesLink>
          
                <enclosure 
                  url="https://github.com/${{ github.repository }}/releases/download/${{ needs.fetch.outputs.version }}/${{ needs.fetch.outputs.dmg_name }}"
                  length="${{ steps.dmg.outputs.size }}"
                  type="application/octet-stream"
                  sparkle:edSignature="${{ steps.sign.outputs.signature }}"
                />
              </item>
          
            </channel>
          </rss>
          EOF

      - name: Commit & Push Appcast
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add appcast.xml
          git diff --cached --quiet || git commit -m "Update appcast ${{ needs.fetch.outputs.version }}"
          git push origin main
